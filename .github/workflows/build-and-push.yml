name: Build & Push to GHCR

on:
  push:
    branches: [main, staging, dev]
    tags: ['v*.*.*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}  # shirazvaival/costsage-web

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to create GitHub Releases on tag pushes
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # full history so we can diff against previous tag

      - name: Determine build environment
        id: env
        run: |
          REF="${GITHUB_REF_NAME}"
          case "$REF" in
            main)    echo "env=prod"    >> "$GITHUB_OUTPUT" ;;
            staging) echo "env=staging" >> "$GITHUB_OUTPUT" ;;
            dev)     echo "env=dev"     >> "$GITHUB_OUTPUT" ;;
            v*)      echo "env=prod"    >> "$GITHUB_OUTPUT" ;;
            *)       echo "env=dev"     >> "$GITHUB_OUTPUT" ;;
          esac
          echo "sha_short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=prod,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=staging,enable=${{ github.ref == 'refs/heads/staging' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_ENV=${{ steps.env.outputs.env }}
            GIT_SHA=${{ steps.env.outputs.sha_short }}
            BUILD_TIME=${{ steps.env.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          {
            echo "## Build summary"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Env   | \`${{ steps.env.outputs.env }}\` |"
            echo "| SHA   | \`${{ steps.env.outputs.sha_short }}\` |"
            echo "| Time  | \`${{ steps.env.outputs.build_time }}\` |"
            echo ""
            echo "### Tags pushed"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # --- Semver-tag-only steps below: release + zip backup ---

      - name: Build changelog (vs previous tag)
        if: startsWith(github.ref, 'refs/tags/v')
        id: changelog
        run: |
          CURR="${GITHUB_REF_NAME}"
          # previous tag by committer date, excluding current
          PREV=$(git tag --sort=-creatordate | grep '^v' | grep -v "^${CURR}$" | head -1 || true)
          {
            echo "changelog<<__END__"
            if [ -z "$PREV" ]; then
              echo "Initial release."
              echo ""
              git log --pretty=format:'- %s (%h)' | head -50
            else
              echo "### Changes since ${PREV}"
              echo ""
              git log --pretty=format:'- %s (%h)' "${PREV}..HEAD"
            fi
            echo ""
            echo "__END__"
            echo "prev=${PREV}" >> "$GITHUB_OUTPUT"
          } >> "$GITHUB_OUTPUT"

      - name: Package site.zip (rollback artifact)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VER="${GITHUB_REF_NAME}"
          cd site
          zip -r "../site-${VER}.zip" . >/dev/null
          cd ..
          ls -lh "site-${VER}.zip"
          # build-manifest.txt — one-stop rollback reference
          cat > "build-manifest-${VER}.txt" <<EOF
          CostSage Web — Build Manifest
          =============================
          Version:       ${VER}
          Commit:        ${GITHUB_SHA}
          Short SHA:     ${{ steps.env.outputs.sha_short }}
          Build time:    ${{ steps.env.outputs.build_time }}
          Build env:     ${{ steps.env.outputs.env }}

          Pull this exact version:
            docker pull ghcr.io/${{ github.repository }}:${VER#v}
            docker pull ghcr.io/${{ github.repository }}:sha-${{ steps.env.outputs.sha_short }}

          Rollback on Ubuntu laptop:
            ssh root@marketing-claude-soc.rundev.us \\
              'docker pull ghcr.io/${{ github.repository }}:${VER#v} && \\
               cd /opt/wordpress && \\
               sed -i "s|costsage-web:[^ ]*|costsage-web:${VER#v}|" docker-compose.yml && \\
               docker compose up -d costsage-web'

          Verify running:
            curl http://10.16.140.59:8090/_build
          EOF

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            **Docker image:** `ghcr.io/${{ github.repository }}:${{ github.ref_name }}`

            Pull this exact build:
            ```
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            ${{ steps.changelog.outputs.changelog }}

            ---
            Commit: `${{ github.sha }}` · Build time: `${{ steps.env.outputs.build_time }}`
          files: |
            site-${{ github.ref_name }}.zip
            build-manifest-${{ github.ref_name }}.txt
          generate_release_notes: false
