<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="g42" cx="42%" cy="36%" r="68%">
      <stop offset="0%" stop-color="#3B8FD2"/>
      <stop offset="55%" stop-color="#0E55A4"/>
      <stop offset="100%" stop-color="#07266A"/>
    </radialGradient>
    <!-- Clip to inner white circle for bottom banner -->
    <clipPath id="cc42"><circle cx="100" cy="100" r="68"/></clipPath>
    <!-- Wider ring: same structure as 27001 -->
    <path id="tp42" d="M 16,100 A 84,84 0 0,0 184,100"/>
  </defs>

  <!-- Outer blue circle -->
  <circle cx="100" cy="100" r="99" fill="url(#g42)"/>
  <!-- White inner content area -->
  <circle cx="100" cy="100" r="68" fill="white"/>

  <!-- Globe grid (faint) inside white area -->
  <g fill="none" stroke="#0E55A4" stroke-width="0.9" opacity="0.1" clip-path="url(#cc42)">
    <circle cx="100" cy="95" r="38"/>
    <circle cx="100" cy="95" r="25"/>
    <ellipse cx="100" cy="95" rx="38" ry="19"/>
    <ellipse cx="100" cy="95" rx="38" ry="7"/>
    <ellipse cx="100" cy="95" rx="19" ry="38"/>
    <ellipse cx="100" cy="95" rx="7"  ry="38"/>
    <line x1="62" y1="95" x2="138" y2="95"/>
    <line x1="100" y1="57" x2="100" y2="133"/>
  </g>

  <!-- "AI Management System" — shorter label allows larger font in the ring -->
  <text font-family="Arial,Helvetica,sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="0.3">
    <textPath href="#tp42" startOffset="50%" text-anchor="middle">AI Management System</textPath>
  </text>

  <!-- ISO -->
  <text x="100" y="72" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="900" fill="#07266A">ISO</text>
  <!-- 42001 -->
  <text x="100" y="102" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif" font-size="32" font-weight="900" fill="#07266A">42001</text>

  <!-- Blue bottom banner clipped to inner circle -->
  <rect x="20" y="108" width="160" height="55" fill="#07266A" clip-path="url(#cc42)"/>
  <!-- Certified -->
  <text x="100" y="134" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif" font-size="16" font-weight="700" fill="white" letter-spacing="0.5">Certified</text>
</svg>
