<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="g9001" cx="42%" cy="36%" r="70%">
      <stop offset="0%" stop-color="#2E8FD8"/>
      <stop offset="60%" stop-color="#0E52A0"/>
      <stop offset="100%" stop-color="#082C6E"/>
    </radialGradient>
    <path id="tp9001" d="M 14,100 A 86,86 0 0,0 186,100"/>
    <clipPath id="cc9001"><circle cx="100" cy="100" r="98"/></clipPath>
  </defs>

  <!-- Main blue circle -->
  <circle cx="100" cy="100" r="99" fill="url(#g9001)"/>
  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="93" fill="none" stroke="white" stroke-width="2.5" opacity="0.5"/>
  <!-- Second decorative ring -->
  <circle cx="100" cy="100" r="87" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>

  <!-- Globe / lattice grid -->
  <g fill="none" stroke="white" stroke-width="1" opacity="0.2">
    <circle cx="100" cy="100" r="44"/>
    <circle cx="100" cy="100" r="30"/>
    <circle cx="100" cy="100" r="16"/>
    <ellipse cx="100" cy="100" rx="44" ry="22"/>
    <ellipse cx="100" cy="100" rx="44" ry="8"/>
    <ellipse cx="100" cy="100" rx="22" ry="44"/>
    <ellipse cx="100" cy="100" rx="8"  ry="44"/>
    <line x1="56" y1="100" x2="144" y2="100"/>
    <line x1="100" y1="56" x2="100" y2="144"/>
  </g>

  <!-- "QUALITY MANAGEMENT SYSTEM" arc text — font-size bumped for legibility -->
  <text font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="white" letter-spacing="0.5">
    <textPath href="#tp9001" startOffset="50%" text-anchor="middle">QUALITY MANAGEMENT SYSTEM</textPath>
  </text>

  <!-- Large ISO -->
  <text x="100" y="98" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif" font-size="44" font-weight="900" fill="white">ISO</text>
  <!-- 9001:2015 -->
  <text x="100" y="124" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif" font-size="19" font-weight="700" fill="white" letter-spacing="0.5">9001:2015</text>
  <!-- Bottom label strip -->
  <rect x="1" y="149" width="198" height="30" fill="rgba(0,0,0,0.28)" clip-path="url(#cc9001)"/>
  <text x="100" y="168" text-anchor="middle"
        font-family="Arial,Helvetica,sans-serif" font-size="12" font-weight="700" fill="rgba(255,255,255,0.9)" letter-spacing="1">CERTIFIED</text>
</svg>
